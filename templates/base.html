<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NewsNarrative{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="nn-nav">
  <div class="container" style="max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;width:100%;">
    <a class="nn-brand" href="{{ url_for('index') }}">
      <img src="{{ url_for('static', filename='logo.svg') }}" alt="NewsNarrative logo" width="28" height="28">
      NewsNarrative
    </a>
    <div class="nn-nav-actions">
      <a href="{{ url_for('history') }}" class="btn-secondary">History</a>
      <form action="{{ url_for('trigger_fetch') }}" method="post" style="margin:0;">
        <button type="submit" class="btn-primary">Fetch Now</button>
      </form>
    </div>
  </div>
</nav>

<div class="page-container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="nn-alert {{ 'warning' if category == 'warning' else '' }}">
        <div class="spinner" style="{{ 'display:none' if category == 'warning' else '' }}"></div>
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<footer class="nn-footer">
  <div class="nn-footer-links">
    <a href="https://github.com/batraprashant/NewsNarrative" target="_blank" rel="noopener">GitHub Repo</a>
    <span class="nn-footer-sep">&middot;</span>
    <a href="https://github.com/batraprashant/NewsNarrative/blob/main/README.md" target="_blank" rel="noopener">Documentation</a>
    <span class="nn-footer-sep">&middot;</span>
    <a href="https://github.com/batraprashant/NewsNarrative/blob/main/RELEASE_NOTES.md" target="_blank" rel="noopener">Release Notes</a>
  </div>
  <div class="nn-footer-copy">NewsNarrative &mdash; Powered by NewsAPI &amp; OpenAI GPT-5.5</div>
</footer>

</body>
</html>
