<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NewsNarrative{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
      <i class="bi bi-newspaper me-2"></i>NewsNarrative
    </a>
    <div class="d-flex gap-2 align-items-center">
      <a href="{{ url_for('history') }}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-clock-history me-1"></i>History
      </a>
      <form action="{{ url_for('trigger_fetch') }}" method="post" class="d-inline">
        <button type="submit" class="btn btn-warning btn-sm">
          <i class="bi bi-arrow-clockwise me-1"></i>Fetch Now
        </button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'warning' if category == 'warning' else 'info' }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<footer class="mt-5 py-3 border-top text-center text-muted small">
  NewsNarrative &mdash; Powered by NewsAPI &amp; OpenAI GPT-5.5
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
